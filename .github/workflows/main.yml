name: Busca Diaria MPRJ

on:
  schedule:
    # 09:17 UTC = 06:17 AM no Horário de Brasília
    # O minuto 17 foge do congestionamento global do GitHub
    - cron: '17 9 * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: baixar codigo
        uses: actions/checkout@v4

      - name: configurar python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: instalar bibliotecas
        run: |
          pip install requests pandas openpyxl PyMuPDF

      - name: rodar busca
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python busca_mprj.py
