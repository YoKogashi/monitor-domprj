name: Busca Diaria MPRJ

on:
  schedule:
    # 13:00 UTC = 10:00 AM Brasília
    - cron: '0 13 * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: baixar codigo
        uses: actions/checkout@v4
      - name: configurar python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: instalar bibliotecas
        run: pip install requests beautifulsoup4 pandas openpyxl google-genai PyMuPDF
      - name: rodar busca
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python busca_mprj.py
